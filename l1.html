<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preloader - St Francis Catholic College, Edmondson Park</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #preloader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background-color: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateY(0);
            transition: transform 0.65s cubic-bezier(0.76, 0, 0.24, 1);
        }

        #preloader.wipe-up {
            transform: translateY(-100%);
        }

        .preloader-logo {
            opacity: 0;
            animation: logoFadeIn 0.9s ease forwards 0.15s;
        }

        .preloader-logo object,
        .preloader-logo img {
            width: 168px;
            height: auto;
            display: block;
        }

        @keyframes logoFadeIn {
            to {
                opacity: 1;
            }
        }


        body {
            font-family: sans-serif;
        }

        .hero {
            min-height: 100vh;
            background-color: #B4D56C;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            gap: 20px;
        }

        .hero h1 {
            color: #181136;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            line-height: 1.2;
        }
    </style>
</head>

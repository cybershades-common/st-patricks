<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Center Sun Loader</title>

  <style>
    :root {
      /* =====================================================
         EASY CONTROL PANEL
         Change only these values
      ===================================================== */

      /* Page loader background */
      --loader-bg: #ffffff;

      /* Sun size before scaling */
      --sun-size: 300px;

      /* Sun growth control */
      --sun-start-scale: 0.04;
      --sun-end-scale: 8.8;

      /* Animation speed */
      --loader-duration: 4200ms;
      --wipe-duration: 1150ms;

      /* Final fade after sun becomes full screen */
      --sun-final-opacity: 0.48;

      /* Sun colours */
      --spc-sun-center: #fff02a;
      --spc-sun-center-soft: #fff9a8;
      --spc-sun-center-end: 12%;

      --spc-sun-peak: #ffdd00;
      --spc-sun-peak-at: 34%;

      --spc-sun-limb: #ffd000;
      --spc-sun-limb-at: 56%;

      --spc-sun-fade: rgba(255, 208, 0, 0.18);

      /* Blur controls */
      --sun-outer-blur-start: 22px;
      --sun-outer-blur-end: 34px;

      --sun-inner-blur-start: 7px;
      --sun-inner-blur-end: 16px;

      /* Brightness controls */
      --sun-outer-final-brightness: 1.22;
      --sun-inner-final-brightness: 1.3;

      /* Final softness */
      --sun-outer-final-opacity: 0.36;
      --sun-inner-final-opacity: 0.34;

      /* Wipe direction */
      --loader-wipe-y: -100%;
    }

    /* =====================================================
       RESET
    ===================================================== */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    body {
      overflow: hidden;
    }

    body.loaded {
      overflow: auto;
    }

    /* =====================================================
       WEBSITE CONTENT
    ===================================================== */

    .website {
      min-height: 100vh;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    .website-content {
      max-width: 900px;
      opacity: 0;
      transform: translateY(30px);
      transition:
        opacity 900ms ease,
        transform 900ms ease;
    }

    body.loaded .website-content {
      opacity: 1;
      transform: translateY(0);
    }

    .website h1 {
      font-size: clamp(44px, 8vw, 120px);
      line-height: 0.95;
      letter-spacing: -4px;
      color: #111111;
      margin-bottom: 18px;
    }

    .website p {
      font-size: 18px;
      color: #666666;
      line-height: 1.6;
    }

    /* =====================================================
       FULL SCREEN LOADER
    ===================================================== */

    .site-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--loader-bg);
      overflow: hidden;

      transform: translate3d(0, 0, 0);
      transition: transform var(--wipe-duration) cubic-bezier(0.76, 0, 0.24, 1);

      will-change: transform;
    }

    .site-loader.loader-wipe-up {
      transform: translate3d(0, var(--loader-wipe-y), 0);
    }

    /* =====================================================
       CENTER SUN
    ===================================================== */

    .sun-loader {
      position: absolute;
      top: 50%;
      left: 50%;

      width: var(--sun-size);
      height: var(--sun-size);
      border-radius: 50%;

      opacity: 0;
      transform:
        translate3d(-50%, -50%, 0)
        scale(var(--sun-start-scale));

      transform-origin: center center;
      backface-visibility: hidden;

      will-change: transform, opacity;

      animation:
        sunSmoothGrow
        var(--loader-duration)
        linear
        forwards;
    }

    .sun-loader::before {
      content: "";
      position: absolute;
      inset: -32%;
      border-radius: 50%;

      background:
        radial-gradient(
          circle,
          var(--spc-sun-center) 0%,
          var(--spc-sun-center) var(--spc-sun-center-end),
          var(--spc-sun-peak) var(--spc-sun-peak-at),
          var(--spc-sun-limb) var(--spc-sun-limb-at),
          var(--spc-sun-fade) 74%,
          rgba(255, 236, 120, 0.08) 86%,
          rgba(255, 255, 255, 0) 100%
        );

      filter:
        blur(var(--sun-outer-blur-start))
        brightness(1);

      transform: translateZ(0);
      will-change: opacity, filter;

      animation:
        sunOuterFade
        var(--loader-duration)
        linear
        forwards;
    }

    .sun-loader::after {
      content: "";
      position: absolute;
      inset: 3%;
      border-radius: 50%;

      background:
        radial-gradient(
          circle,
          var(--spc-sun-center-soft) 0%,
          var(--spc-sun-center) 18%,
          var(--spc-sun-peak) var(--spc-sun-peak-at),
          var(--spc-sun-limb) var(--spc-sun-limb-at),
          rgba(255, 221, 0, 0.14) 72%,
          rgba(255, 255, 255, 0) 96%
        );

      filter:
        blur(var(--sun-inner-blur-start))
        brightness(1);

      transform: translateZ(0);
      will-change: opacity, filter;

      animation:
        sunInnerFade
        var(--loader-duration)
        linear
        forwards;
    }

    /* =====================================================
       ANIMATIONS
    ===================================================== */

    @keyframes sunSmoothGrow {
      0% {
        opacity: 0;
        transform:
          translate3d(-50%, -50%, 0)
          scale(var(--sun-start-scale));
      }

      8% {
        opacity: 1;
      }

      78% {
        opacity: 1;
        transform:
          translate3d(-50%, -50%, 0)
          scale(calc(var(--sun-end-scale) * 0.86));
      }

      100% {
        opacity: var(--sun-final-opacity);
        transform:
          translate3d(-50%, -50%, 0)
          scale(var(--sun-end-scale));
      }
    }

    @keyframes sunOuterFade {
      0% {
        opacity: 1;
        filter:
          blur(var(--sun-outer-blur-start))
          brightness(1);
      }

      78% {
        opacity: 1;
        filter:
          blur(var(--sun-outer-blur-start))
          brightness(1.04);
      }

      100% {
        opacity: var(--sun-outer-final-opacity);
        filter:
          blur(var(--sun-outer-blur-end))
          brightness(var(--sun-outer-final-brightness));
      }
    }

    @keyframes sunInnerFade {
      0% {
        opacity: 1;
        filter:
          blur(var(--sun-inner-blur-start))
          brightness(1);
      }

      78% {
        opacity: 1;
        filter:
          blur(var(--sun-inner-blur-start))
          brightness(1.05);
      }

      100% {
        opacity: var(--sun-inner-final-opacity);
        filter:
          blur(var(--sun-inner-blur-end))
          brightness(var(--sun-inner-final-brightness));
      }
    }

    /* =====================================================
       RESPONSIVE
    ===================================================== */

    @media (max-width: 768px) {
      :root {
        --sun-size: 230px;
        --sun-end-scale: 10;
      }

      .website h1 {
        letter-spacing: -2px;
      }
    }
  </style>
</head>

<body>

  <!-- Loader -->
  <div class="site-loader" id="siteLoader">
    <div class="sun-loader"></div>
  </div>

  <!-- Website -->
  <main class="website">
    <div class="website-content">
      <h1>Your Website</h1>
      <p>Replace this section with your real website content.</p>
    </div>
  </main>

  <script>
    const loader = document.getElementById("siteLoader");
    const rootStyles = getComputedStyle(document.documentElement);

    function getMilliseconds(variableName) {
      const value = rootStyles.getPropertyValue(variableName).trim();

      if (value.endsWith("ms")) {
        return parseFloat(value);
      }

      if (value.endsWith("s")) {
        return parseFloat(value) * 1000;
      }

      return parseFloat(value);
    }

    const loaderDuration = getMilliseconds("--loader-duration");
    const wipeDuration = getMilliseconds("--wipe-duration");

    window.addEventListener("load", () => {
      setTimeout(() => {
        loader.classList.add("loader-wipe-up");
        document.body.classList.add("loaded");
      }, loaderDuration);

      setTimeout(() => {
        loader.style.display = "none";
      }, loaderDuration + wipeDuration + 150);
    });
  </script>

</body>
</html>

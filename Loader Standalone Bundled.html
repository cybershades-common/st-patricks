  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Loading…<\u002Ftitle>\n<style>\n  :root {\n    --flame: #fff02a;\n    --cream-1: #fff56b;\n    --cream-2: #fde98a;\n    --cream-3: #f7efb8;\n    --cream-4: #faf3c4;\n    --cream-5: #fbf6d8;\n  }\n\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; background: var(--cream-5); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #2a2a2a; }\n\n  /* ---------- Loader ---------- */\n  .loader {\n    position: fixed; inset: 0;\n    background: var(--cream-5);\n    display: flex; align-items: center; justify-content: center;\n    overflow: hidden;\n    z-index: 9999;\n    will-change: transform;\n  }\n\n  .sunlight {\n    position: absolute;\n    left: -20%; top: -20%;\n    width: 140%; height: 140%;\n    background: radial-gradient(circle at 50% 50%,\n      var(--flame)  0%,\n      var(--cream-1) 18%,\n      var(--cream-2) 36%,\n      var(--cream-3) 58%,\n      var(--cream-4) 78%,\n      var(--cream-5) 100%);\n    animation: sunGrow 5s ease-in-out infinite;\n    transform-origin: 50% 50%;\n    pointer-events: none;\n  }\n\n  @keyframes sunGrow {\n    0%, 100% { opacity: 0.85; transform: scale(0.96); }\n    50%      { opacity: 1;    transform: scale(1.04); }\n  }\n\n  .sun-wrap {\n    position: relative;\n    width: 300px; height: 300px;\n    display: flex; align-items: center; justify-content: center;\n    will-change: transform, opacity;\n    opacity: 0;\n  }\n  .sun-breathe {\n    position: absolute; inset: 0;\n    display: flex; align-items: center; justify-content: center;\n    animation: sunBreathe 3.2s ease-in-out infinite;\n    will-change: transform;\n  }\n  @keyframes sunBreathe {\n    0%, 100% { transform: scale(0.98); }\n    50%      { transform: scale(1.06); }\n  }\n\n  .sun-halo, .sun-conic, .sun-core {\n    position: absolute; inset: 0;\n    border-radius: 50%;\n  }\n  .sun-halo {\n    inset: -60%;\n    background: radial-gradient(circle, rgba(255,240,42,.25) 0%, rgba(255,240,42,.1) 35%, transparent 65%);\n    filter: blur(30px);\n  }\n  .sun-conic {\n    background: conic-gradient(from 0deg, var(--flame), #fff02acc, var(--flame), #fff02add, var(--flame));\n    filter: blur(4px);\n    mix-blend-mode: multiply;\n    animation: sunSpin 14s linear infinite;\n  }\n  @keyframes sunSpin { to { transform: rotate(360deg); } }\n  .sun-core {\n    background: radial-gradient(circle, var(--flame) 0%, #fff02add 45%, rgba(255,240,42,.4) 75%, transparent 100%);\n    filter: blur(6px);\n  }\n\n  .logo {\n    position: relative; z-index: 2;\n    width: 140px; height: 168px;\n    object-fit: contain;\n    filter: drop-shadow(0 4px 18px rgba(0,0,0,.18));\n  }\n\n  .loading-text {\n    position: absolute; left: 50%; bottom: 100px;\n    transform: translateX(-50%);\n    width: min(900px, 86vw);\n    margin: 0;\n    text-align: center;\n    font-size: 14px; line-height: 1.7;\n    font-weight: 400;\n    color: #2a2a2a;\n    letter-spacing: 0.01em;\n    text-wrap: pretty;\n    opacity: 0;\n  }\n\n  /* ---------- Main page ---------- */\n  .page {\n    min-height: 100vh;\n    padding: 80px 8vw;\n    display: grid;\n    grid-template-columns: 1fr;\n    gap: 48px;\n    max-width: 1080px;\n    margin: 0 auto;\n  }\n  .page h1 {\n    font-size: clamp(44px, 7vw, 96px);\n    line-height: 0.95;\n    letter-spacing: -0.02em;\n    margin: 0;\n    font-weight: 600;\n    text-wrap: balance;\n  }\n  .page p {\n    font-size: 18px; line-height: 1.6; max-width: 56ch;\n    color: #3a3a3a;\n    text-wrap: pretty;\n  }\n  .placeholder {\n    width: 100%; aspect-ratio: 16 / 7; border-radius: 20px;\n    background:\n      repeating-linear-gradient(135deg, rgba(0,0,0,.04) 0 12px, transparent 12px 24px),\n      linear-gradient(180deg, var(--cream-3), var(--cream-5));\n    display: flex; align-items: center; justify-content: center;\n    font-family: ui-monospace, Menlo, monospace; font-size: 12px;\n    color: #8a7a3d; letter-spacing: 2px;\n  }\n\n  /* Lock scroll while loading */\n  body.is-loading { overflow: hidden; }\n<\u002Fstyle>\n<\u002Fhead>\n<body class=\"is-loading\">\n\n  \n\n  <!-- LOADER -->\n  <div class=\"loader\" id=\"loader\" aria-hidden=\"true\">\n    <div class=\"sunlight\"><\u002Fdiv>\n    <div class=\"sun-wrap\" id=\"sunWrap\">\n      <div class=\"sun-breathe\">\n        <div class=\"sun-halo\"><\u002Fdiv>\n        <div class=\"sun-conic\"><\u002Fdiv>\n        <div class=\"sun-core\"><\u002Fdiv>\n        <img class=\"logo\" src=\"ffde051a-a676-44d0-9774-67f7111f1a1d\" alt=\"\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"loading-text\" id=\"ackText\">We acknowledge the Traditional Custodians of the land on which St Patrick’s College stands, the Wangal clan of the Darug People. We pay our respects to Elders past and present, and recognise their enduring connection to Country. As a College community, we are committed to listening, learning and walking together with First Nations peoples in a spirit of respect, justice and reconciliation.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- PAGE CONTENT -->\n  <main class=\"page\">\n    <h1>Welcome to our school.<\u002Fh1>\n    <p>Your real content goes here — this is a demo page so you can see the wipe-up reveal. Drop the loader markup and CSS into any project, call <code>revealPage()<\u002Fcode> when ready, and the screen glides out.<\u002Fp>\n    <div class=\"placeholder\">HERO IMAGE / VIDEO<\u002Fdiv>\n    <p>The loader hides itself automatically after a minimum display time (so it doesn't flash on fast connections) and unlocks scroll once the wipe completes.<\u002Fp>\n  <\u002Fmain>\n\n  <!-- GSAP -->\n  <script src=\"ea647331-1a76-46df-a871-d631e4dab49c\"><\u002Fscript>\n  <script>\n    // Entry: logo fades in at center, then acknowledgement text fades in\n    gsap.timeline()\n      .to('#sunWrap', { opacity: 1, duration: 1.0, ease: 'power2.out' })\n      .to('#ackText', { opacity: 1, duration: 0.9, ease: 'power2.out' }, '-=0.4');\n\n    // Smooth wipe-up reveal (3s minimum display)\n    function revealPage() {\n      const loader = document.getElementById('loader');\n      if (!loader) return;\n      gsap.to(loader, {\n        yPercent: -100,\n        duration: 1.2,\n        ease: 'power3.inOut',\n        onComplete() {\n          loader.remove();\n          document.body.classList.remove('is-loading');\n        }\n      });\n    }\n\n    const MIN_MS = 3000;\n    const started = performance.now();\n    window.addEventListener('load', () => {\n      const elapsed = performance.now() - started;\n      const wait = Math.max(0, MIN_MS - elapsed);\n      setTimeout(revealPage, wait);\n    });\n\n    window.revealPage = revealPage;\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>

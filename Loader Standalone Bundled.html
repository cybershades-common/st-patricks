<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soft Morning Sun Loader</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      background: #fff7ec;
      font-family: Arial, sans-serif;
    }

    body.loading {
      overflow: hidden;
    }

    #loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      overflow: hidden;
      background: #fff2df;
      transform: translateY(0);
      will-change: transform;
    }

    #loader.hide {
      animation: loaderWipeUp 1.25s cubic-bezier(0.76, 0, 0.24, 1) forwards;
    }

    @keyframes loaderWipeUp {
      to {
        transform: translateY(-105%);
      }
    }

    #sun_canvas {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      display: block;
    }

    .site {
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 2rem;
      background: #fff7ec;
      color: #2d1b0f;
    }

    .site h1 {
      font-size: clamp(3rem, 10vw, 8rem);
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .site p {
      max-width: 520px;
      margin: 1rem auto 0;
      line-height: 1.7;
      color: rgba(45, 27, 15, 0.65);
    }
  </style>
</head>

<body class="loading">

  <div id="loader">
    <canvas id="sun_canvas"></canvas>
  </div>

  <main class="site">
    <div>
      <h1>Website Revealed</h1>
      <p>Replace this section with your actual website content.</p>
    </div>
  </main>

  <script>
    /*
      ================================
      EASY SUN CONTROLS
      ================================

      Make sun softer:
      sunBrightness: 0.44
      sunBody: 0.44
      sunGlow: 0.055

      Make sun more visible:
      sunBrightness: 0.65
      sunBody: 0.70
      sunGlow: 0.09

      Make sun bigger:
      sunSize: 0.013

      Make sun smaller:
      sunSize: 0.009

      Make sun stop lower:
      sunEndY: 0.24

      Make animation slower:
      duration: 11000
    */

    const SUN_SETTINGS = {
      duration: 9200,

      // Keeps it morning, but still allows the sun to be visible.
      visualProgressLimit: 0.90,

      // Balanced visibility without harsh glare.
      sunBrightness: 0.56,

      // Main visible sun body.
      sunBody: 0.58,

      // Tiny soft center.
      sunCore: 0.16,

      // Soft outer glow.
      sunGlow: 0.075,

      // Sun visible size.
      sunSize: 0.011,

      // Warm morning glow near horizon.
      horizonGlow: 0.04,

      // Sun vertical movement.
      sunStartY: -0.46,
      sunEndY: 0.34,

      // Rendering quality.
      maxDpr: 1.5
    };

    const canvas = document.getElementById("sun_canvas");
    const loader = document.getElementById("loader");

    const gl = canvas.getContext("webgl", {
      alpha: false,
      antialias: false,
      depth: false,
      stencil: false,
      preserveDrawingBuffer: false,
      powerPreference: "high-performance"
    });

    if (!gl) {
      loader.style.background =
        "linear-gradient(180deg, #fff2df 0%, #ffc891 45%, #fff7ec 100%)";
      setTimeout(endLoader, SUN_SETTINGS.duration);
    } else {
      const vertexSource = `
        attribute vec2 a;

        void main() {
          gl_Position = vec4(a, 0.0, 1.0);
        }
      `;

      const fragmentSource = `
        precision highp float;

        uniform vec2 uR;
        uniform float uT;
        uniform float uP;

        uniform float uSunBrightness;
        uniform float uSunBody;
        uniform float uSunCore;
        uniform float uSunGlow;
        uniform float uSunSize;
        uniform float uHorizonGlow;
        uniform float uSunStartY;
        uniform float uSunEndY;

        float sat(float x) {
          return clamp(x, 0.0, 1.0);
        }

        float smoother(float x) {
          x = sat(x);
          return x * x * x * (x * (x * 6.0 - 15.0) + 10.0);
        }

        float hash(vec2 p) {
          return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
        }

        float noise(vec2 p) {
          vec2 i = floor(p);
          vec2 f = fract(p);
          f = f * f * (3.0 - 2.0 * f);

          float a = hash(i);
          float b = hash(i + vec2(1.0, 0.0));
          float c = hash(i + vec2(0.0, 1.0));
          float d = hash(i + vec2(1.0, 1.0));

          return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
        }

        float fbm(vec2 p) {
          float v = 0.0;
          float a = 0.5;

          for (int i = 0; i < 5; i++) {
            v += a * noise(p);
            p *= 2.02;
            a *= 0.5;
          }

          return v;
        }

        void main() {
          vec2 frag = gl_FragCoord.xy;
          vec2 uv01 = frag / uR.xy;
          vec2 p = (frag - 0.5 * uR.xy) / uR.y;

          float time = uT;
          float progress = smoother(uP);

          /*
            Directional WebGL camera ray.
            This makes the sun feel like shader light, not a flat CSS circle.
          */
          vec3 rd = normalize(vec3(p.x, p.y - 0.02, -1.24));

          /*
            Soft warm morning sky.
          */
          vec3 earlyTop = vec3(0.86, 0.64, 0.62);
          vec3 earlyHorizon = vec3(1.00, 0.55, 0.32);

          vec3 midTop = vec3(0.96, 0.80, 0.70);
          vec3 midHorizon = vec3(1.00, 0.68, 0.44);

          vec3 finalTop = vec3(0.98, 0.86, 0.76);
          vec3 finalHorizon = vec3(1.00, 0.74, 0.50);

          vec3 skyTop;
          vec3 skyHorizon;

          if (progress < 0.62) {
            float k = smoother(progress / 0.62);
            skyTop = mix(earlyTop, midTop, k);
            skyHorizon = mix(earlyHorizon, midHorizon, k);
          } else {
            float k = smoother((progress - 0.62) / 0.38);
            skyTop = mix(midTop, finalTop, k);
            skyHorizon = mix(midHorizon, finalHorizon, k);
          }

          vec3 col = mix(skyHorizon, skyTop, pow(sat(uv01.y), 0.72));

          /*
            Gentle moving morning haze.
          */
          float cloudA = fbm(vec2(p.x * 1.25 + time * 0.004, p.y * 1.05 + 2.0));
          float cloudB = fbm(vec2(p.x * 2.45 - time * 0.003, p.y * 1.55 - 0.4));

          float haze = smoothstep(0.50, 0.86, cloudA * 0.70 + cloudB * 0.30);
          haze *= smoothstep(-0.44, 0.48, p.y);
          haze *= 0.065;

          col = mix(col, vec3(1.0, 0.88, 0.74), haze);

          /*
            Sun movement.
          */
          float sunY = mix(uSunStartY, uSunEndY, progress);
          vec3 sunDir = normalize(vec3(0.0, sunY, -1.0));

          float sunDotRaw = dot(rd, sunDir);
          float sunDot = max(sunDotRaw, 0.0);

          float visible = smoothstep(0.02, 0.16, progress);

          vec3 sunOrange = vec3(0.95, 0.36, 0.13);
          vec3 sunWarm = vec3(1.00, 0.58, 0.27);
          vec3 sunSoft = vec3(1.00, 0.78, 0.48);

          vec3 sunCol = mix(sunWarm, sunSoft, smoother(progress * 0.85));

          /*
            Soft visible sun body.
          */
          float softBody = smoothstep(
            1.0 - uSunSize * 1.55,
            1.0 - uSunSize * 0.18,
            sunDotRaw
          );

          float softCore = pow(sunDot, 560.0) * uSunCore;
          float nearGlow = pow(sunDot, 34.0) * uSunGlow;
          float farGlow = pow(sunDot, 7.0) * uSunGlow * 0.55;

          col = mix(
            col,
            sunCol,
            softBody * uSunBody * uSunBrightness * visible
          );

          col += sunSoft * softCore * uSunBrightness * visible;
          col += sunWarm * nearGlow * uSunBrightness * visible;
          col += sunOrange * farGlow * uSunBrightness * visible;

          /*
            Warm morning glow near horizon.
          */
          float horizonBloom = exp(-abs(p.y + 0.18) * 8.0);
          col += vec3(1.0, 0.45, 0.18) * horizonBloom * uHorizonGlow;

          /*
            Warm lower atmosphere.
          */
          float bottomWarm = smoothstep(0.58, 0.0, uv01.y);
          col = mix(col, vec3(1.0, 0.62, 0.36), bottomWarm * 0.038);

          /*
            Very soft vignette.
          */
          float vig = length(p * vec2(0.74, 1.0));
          col *= 1.0 - smoothstep(0.78, 1.20, vig) * 0.065;

          /*
            Fine grain.
          */
          float grain = hash(gl_FragCoord.xy + floor(time * 10.0)) - 0.5;
          col += grain * 0.002;

          /*
            Gentle tone control.
            Keeps highlights soft, but lets the sun stay visible.
          */
          col = mix(col, min(col, vec3(1.0, 0.92, 0.82)), 0.22);

          gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
        }
      `;

      function createShader(type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);

        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          console.error(gl.getShaderInfoLog(shader));
          gl.deleteShader(shader);
          return null;
        }

        return shader;
      }

      const vertexShader = createShader(gl.VERTEX_SHADER, vertexSource);
      const fragmentShader = createShader(gl.FRAGMENT_SHADER, fragmentSource);

      const program = gl.createProgram();

      gl.attachShader(program, vertexShader);
      gl.attachShader(program, fragmentShader);
      gl.linkProgram(program);

      if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        console.error(gl.getProgramInfoLog(program));
      }

      gl.useProgram(program);

      gl.disable(gl.DEPTH_TEST);
      gl.disable(gl.CULL_FACE);
      gl.disable(gl.BLEND);
      gl.disable(gl.DITHER);

      const buffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buffer);

      gl.bufferData(
        gl.ARRAY_BUFFER,
        new Float32Array([
          -1, -1,
           1, -1,
          -1,  1,
           1,  1
        ]),
        gl.STATIC_DRAW
      );

      const position = gl.getAttribLocation(program, "a");
      gl.enableVertexAttribArray(position);
      gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0);

      const uR = gl.getUniformLocation(program, "uR");
      const uT = gl.getUniformLocation(program, "uT");
      const uP = gl.getUniformLocation(program, "uP");

      const uSunBrightness = gl.getUniformLocation(program, "uSunBrightness");
      const uSunBody = gl.getUniformLocation(program, "uSunBody");
      const uSunCore = gl.getUniformLocation(program, "uSunCore");
      const uSunGlow = gl.getUniformLocation(program, "uSunGlow");
      const uSunSize = gl.getUniformLocation(program, "uSunSize");
      const uHorizonGlow = gl.getUniformLocation(program, "uHorizonGlow");
      const uSunStartY = gl.getUniformLocation(program, "uSunStartY");
      const uSunEndY = gl.getUniformLocation(program, "uSunEndY");

      function sendSettingsToShader() {
        gl.uniform1f(uSunBrightness, SUN_SETTINGS.sunBrightness);
        gl.uniform1f(uSunBody, SUN_SETTINGS.sunBody);
        gl.uniform1f(uSunCore, SUN_SETTINGS.sunCore);
        gl.uniform1f(uSunGlow, SUN_SETTINGS.sunGlow);
        gl.uniform1f(uSunSize, SUN_SETTINGS.sunSize);
        gl.uniform1f(uHorizonGlow, SUN_SETTINGS.horizonGlow);
        gl.uniform1f(uSunStartY, SUN_SETTINGS.sunStartY);
        gl.uniform1f(uSunEndY, SUN_SETTINGS.sunEndY);
      }

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, SUN_SETTINGS.maxDpr);
        const width = Math.max(1, Math.floor(window.innerWidth * dpr));
        const height = Math.max(1, Math.floor(window.innerHeight * dpr));

        canvas.width = width;
        canvas.height = height;
        canvas.style.width = window.innerWidth + "px";
        canvas.style.height = window.innerHeight + "px";

        gl.viewport(0, 0, width, height);
        gl.uniform2f(uR, width, height);
        sendSettingsToShader();
      }

      window.addEventListener("resize", resize, { passive: true });
      resize();

      const start = performance.now();

      function easeSmoothMorning(x) {
        return x * x * x * (x * (x * 6.0 - 15.0) + 10.0);
      }

      function frame(now) {
        const elapsed = now - start;
        const raw = Math.min(elapsed / SUN_SETTINGS.duration, 1);
        const eased = easeSmoothMorning(raw);

        const visualProgress = eased * SUN_SETTINGS.visualProgressLimit;

        gl.uniform1f(uT, elapsed / 1000);
        gl.uniform1f(uP, visualProgress);
        sendSettingsToShader();

        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

        if (raw < 1) {
          requestAnimationFrame(frame);
        } else {
          setTimeout(endLoader, 350);
        }
      }

      requestAnimationFrame(frame);
    }

    function endLoader() {
      loader.classList.add("hide");
      document.body.classList.remove("loading");

      setTimeout(() => {
        loader.remove();
      }, 1450);
    }
  </script>

</body>
</html>

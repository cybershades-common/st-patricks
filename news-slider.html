<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Slider</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: #e2e0e0;
        }

        main {
            display: flex;
            flex-direction: column;
            width: 100vw;
            min-height: 100vh;
            padding: 2.5rem 2rem 2rem;
            overflow: hidden;
        }

        /* ── Header: filters left, arrows right ── */
        .slider-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            flex-shrink: 0;
        }

        .slider-filters {
            display: flex;
            gap: 0.5rem;
        }

        .filter-btn {
            font-family: inherit;
            font-size: 0.6875rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.45rem 1.1rem;
            border-radius: 999px;
            border: 1px solid #84754E;
            background: transparent;
            color: #84754E;
            cursor: pointer;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: #27251F;
            color: #fff;
            border-color: #27251F;
        }

        .slider-nav {
            display: flex;
            gap: 0.5rem;
        }

        .nav-btn {
            width: 2.8125rem;
            height: 2.8125rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            border-radius: 50%;
            padding: 0;
            cursor: pointer;
            color: #27251F;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .nav-btn:hover {
            color: #10069F;
            transform: scale(1.1);
        }

        .nav-btn svg {
            width: 2.8125rem;
            height: 2.8125rem;
        }

        /* ── Slider ── */
        .slider-container {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding: 0.5rem 0 1.5rem;
            flex: 1;
        }

        .slider-track {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            will-change: transform;
        }

        /* Inactive slide */
        .slide {
            flex-shrink: 0;
            width: 333px;
            background: #fff;
            overflow: hidden;
            transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .slide.slide-hidden {
            display: none;
        }

        /* Active slide */
        .slide.active {
            width: 680px;
        }

        .slide-img-wrap {
            overflow: hidden;
        }

        .slide-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
            transition: height 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                transform 0.55s ease;
        }

        .slide.active .slide-img {
            height: 500px;
        }

        .slide-link:hover .slide-img,
        .slide-link:focus-visible .slide-img {
            transform: scale(1.2);
        }

        .slide-link {
            display: block;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }

        .slide-content {
            padding: 1rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .slide-title {
            font-size: 1.1rem;
            font-weight: 300;
            color: #10069F;
            line-height: 1.4;
            transition: font-size 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .slide.active .slide-title {
            font-size: 1.875rem;
        }

        .slide-date {
            font-size: 0.6875rem;
            font-weight: 400;
            color: #27251F;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <main>

        <!-- Header row -->
        <div class="slider-header">
            <div class="slider-filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="events">Events</button>
                <button class="filter-btn" data-filter="community">Community</button>
            </div>
            <div class="slider-nav">
                <button class="nav-btn" id="prevBtn" aria-label="Previous">
                    <svg viewBox="0 0 45 45" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="22.5" cy="22.5" r="21.5" stroke="currentColor" stroke-width="1.2" />
                        <path d="M25 15L18 22.5L25 30" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </button>
                <button class="nav-btn" id="nextBtn" aria-label="Next">
                    <svg viewBox="0 0 45 45" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="22.5" cy="22.5" r="21.5" stroke="currentColor" stroke-width="1.2" />
                        <path d="M20 15L27 22.5L20 30" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Slider -->
        <div class="slider-container" id="sliderContainer">
            <div class="slider-track" id="sliderTrack">

                <div class="slide active" data-category="events">
                    <a class="slide-link" href="#">
                        <div class="slide-img-wrap">
                            <img class="slide-img" src="assets/images/m3.jpg" alt="Black Tie Liturgy">
                        </div>
                        <div class="slide-content">
                            <p class="slide-title">Black Tie Liturgy</p>
                            <p class="slide-date">22.09.25</p>
                        </div>
                    </a>
                </div>

                <div class="slide" data-category="community">
                    <a class="slide-link" href="#">
                        <div class="slide-img-wrap">
                            <img class="slide-img" src="assets/images/m4.jpg" alt="Celebrating Father's Day">
                        </div>
                        <div class="slide-content">
                            <p class="slide-title">Celebrating Father's Day</p>
                            <p class="slide-date">10.09.25</p>
                        </div>
                    </a>
                </div>

                <div class="slide" data-category="events">
                    <a class="slide-link" href="#">
                        <div class="slide-img-wrap">
                            <img class="slide-img" src="assets/images/m2.jpg" alt="Farewell to the Class of 2025">
                        </div>
                        <div class="slide-content">
                            <p class="slide-title">Farewell to the Class of 2025</p>
                            <p class="slide-date">18.09.25</p>
                        </div>
                    </a>
                </div>

                <div class="slide" data-category="community">
                    <a class="slide-link" href="#">
                        <div class="slide-img-wrap">
                            <img class="slide-img" src="assets/images/m3.jpg" alt="Year 5 Welcome Day">
                        </div>
                        <div class="slide-content">
                            <p class="slide-title">Year 5 Welcome Day</p>
                            <p class="slide-date">05.09.25</p>
                        </div>
                    </a>
                </div>

                <div class="slide" data-category="events">
                    <a class="slide-link" href="#">
                        <div class="slide-img-wrap">
                            <img class="slide-img" src="assets/images/m4.jpg" alt="Year 12 Formal 2025">
                        </div>
                        <div class="slide-content">
                            <p class="slide-title">Year 12 Formal 2025</p>
                            <p class="slide-date">01.09.25</p>
                        </div>
                    </a>
                </div>

                <div class="slide" data-category="community">
                    <a class="slide-link" href="#">
                        <div class="slide-img-wrap">
                            <img class="slide-img" src="assets/images/m2.jpg" alt="Middle School Science Fair">
                        </div>
                        <div class="slide-content">
                            <p class="slide-title">Middle School Science Fair</p>
                            <p class="slide-date">28.08.25</p>
                        </div>
                    </a>
                </div>

                <div class="slide" data-category="events">
                    <a class="slide-link" href="#">
                        <div class="slide-img-wrap">
                            <img class="slide-img" src="assets/images/m3.jpg" alt="HSC Study Skills Day">
                        </div>
                        <div class="slide-content">
                            <p class="slide-title">HSC Study Skills Day</p>
                            <p class="slide-date">22.08.25</p>
                        </div>
                    </a>
                </div>

                <div class="slide" data-category="community">
                    <a class="slide-link" href="#">
                        <div class="slide-img-wrap">
                            <img class="slide-img" src="assets/images/m4.jpg" alt="Junior Drama Workshop">
                        </div>
                        <div class="slide-content">
                            <p class="slide-title">Junior Drama Workshop</p>
                            <p class="slide-date">18.08.25</p>
                        </div>
                    </a>
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <script>

        var allSlides = Array.from(document.querySelectorAll('.slide'));
        var track = document.getElementById('sliderTrack');

        var activeIndex = 0;
        var visibleSlides = allSlides.slice(); // slides currently shown by filter
        var inactiveW = 333;
        var gap = 20;

        /* ── Offset so slide[index] sits at the left edge ── */
        function offsetForIndex(index) {
            return -(index * (inactiveW + gap));
        }

        /* ── Navigate to a visible-slide index ── */
        function goTo(index) {
            var len = visibleSlides.length;
            index = ((index % len) + len) % len; // wrap around
            visibleSlides[activeIndex].classList.remove('active');
            activeIndex = index;
            visibleSlides[activeIndex].classList.add('active');
            gsap.to(track, {
                x: offsetForIndex(activeIndex),
                duration: 0.65,
                ease: 'power3.out'
            });
        }

        /* ── Prev / Next buttons ── */
        document.getElementById('prevBtn').addEventListener('click', function () {
            goTo(activeIndex - 1);
        });
        document.getElementById('nextBtn').addEventListener('click', function () {
            goTo(activeIndex + 1);
        });

        /* ── Filters ── */
        document.querySelectorAll('.filter-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.filter-btn').forEach(function (b) {
                    b.classList.remove('active');
                });
                btn.classList.add('active');

                var filter = btn.dataset.filter;

                // Remove active from current slide before hiding
                if (visibleSlides[activeIndex]) {
                    visibleSlides[activeIndex].classList.remove('active');
                }

                // Show/hide slides
                allSlides.forEach(function (slide) {
                    if (filter === 'all' || slide.dataset.category === filter) {
                        slide.classList.remove('slide-hidden');
                    } else {
                        slide.classList.add('slide-hidden');
                    }
                });

                // Rebuild visible list
                visibleSlides = allSlides.filter(function (s) {
                    return !s.classList.contains('slide-hidden');
                });

                // Reset to first visible
                activeIndex = 0;
                if (visibleSlides.length > 0) {
                    visibleSlides[0].classList.add('active');
                }
                gsap.set(track, { x: 0 });
            });
        });

        /* ── Init ── */
        gsap.set(track, { x: offsetForIndex(activeIndex) });
    </script>
</body>

</html>
